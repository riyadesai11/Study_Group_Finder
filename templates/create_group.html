{% extends "base.html" %}
{% block content %}
<div class="glass-card auth-container" style="max-width: 600px;">
    <h2>Create a Study Group</h2>
    <p>Bring people together to learn and grow.</p>
    
    <form method="post">
        <div class="form-group">
            <label class="form-label" for="name">Group Name</label>
            <input class="form-control" type="text" name="name" id="name" required placeholder="e.g. Advanced Calculus Ninjas">
        </div>
        <div class="form-group">
            <label class="form-label" for="subject_id">Subject</label>
            <select class="form-control" name="subject_id" id="subject_id" required>
                {% for subject in subjects %}
                    <option value="{{ subject['id'] }}">{{ subject['name'] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" name="description" id="description" rows="4" placeholder="What will this group focus on?" required></textarea>
        </div>
        
        <div style="display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Create Group</button>
            <a href="{{ url_for('groups') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
