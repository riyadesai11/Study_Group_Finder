{% extends "base.html" %}
{% block content %}
<div class="auth-container glass-card">
    <h2>Welcome Back</h2>
    <p>Login to find your perfect study match.</p>

    <form method="post">
        <div class="form-group">
            <label class="form-label" for="prn">Student ID</label>
            <input class="form-control" type="text" name="prn" id="prn" pattern="2602403250(0[1-9]|[1-8][0-9])"
                minlength="12" maxlength="12"
                title="Invalid Student ID. Must be 12 digits (260240325001 - 260240325089)"
                oninvalid="this.setCustomValidity('Invalid Student ID.')" oninput="this.setCustomValidity('')" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div style="position: relative; display: flex; align-items: center;">
                <input class="form-control" type="password" name="password" id="password" required style="padding-right: 2.5rem;">
                <button type="button" onclick="togglePassword('password', this)" style="position: absolute; right: 10px; background: none; border: none; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; padding: 0;">
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>

    <p style="margin-top: 1.5rem; text-align: center;">
        Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent);">Register</a>
    </p>
</div>
{% endblock %}
